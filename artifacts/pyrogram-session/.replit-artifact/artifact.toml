kind = "web"
previewPath = "/"
title = "Pyrogram Session Generator"
version = "1.0.0"
id = "artifacts/pyrogram-session"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20111

[services.development]
run = "pnpm --filter @workspace/pyrogram-session run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pyrogram-session", "run", "build" ]
publicDir = "artifacts/pyrogram-session/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20111"
BASE_PATH = "/"
